name: evpn-fabric

topology:
  kinds:
    ceos:
      image: ceos:4.36.0F

  nodes:
    spine1:
      kind: ceos
      mgmt-ipv4: 172.20.20.11

    leaf1:
      kind: ceos
      mgmt-ipv4: 172.20.20.21

    leaf2:
      kind: ceos
      mgmt-ipv4: 172.20.20.22

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
